<div class="card p-4">
  <p-toast></p-toast>
  
  <div class="flex align-items-center justify-content-between mb-4">
    <h2 class="m-0">Données du patient : {{patient?.prenom}} {{patient?.nom}}</h2>
    <button pButton icon="pi pi-arrow-left" label="Retour" class="p-button-outlined" 
            (click)="goBack()"></button>
  </div>
  
  <div class="mb-4">
    <p-dropdown 
      [options]="filterOptions" 
      [(ngModel)]="selectedFilter" 
      (onChange)="filterSeries()"
      placeholder="Filtrer les séries"
      [showClear]="true"
      styleClass="w-full md:w-20rem">
    </p-dropdown>
  </div>

  <p-table 
    [value]="filteredSeries" 
    [paginator]="true" 
    [rows]="5"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Affichage des séries {first} à {last} sur {totalRecords}"
    [rowsPerPageOptions]="[5,10,20]"
    [tableStyle]="{'min-width': '50rem'}"
    styleClass="p-datatable-sm">
    
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 30%">Nom de la série</th>
        <th style="width: 25%">Date de création</th>
        <th style="width: 25%">Statut</th>
        <th style="width: 20%">Actions</th>
      </tr>
    </ng-template>
    
    <ng-template pTemplate="body" let-serie>
      <tr>
        <td>{{serie.nom}}</td>
        <td>{{serie.dateCreation | date:'dd/MM/yyyy'}}</td>
        <td>
          <span [class]="'status-badge status-' + (serie.active === 'INACTIF' ? 'completed' : 'pending')">
            {{serie.active === 'INACTIF' ? 'Terminée' : 'En cours'}}
          </span>
        </td>
        <td>
          <div class="flex gap-2">
            <button pButton icon="pi pi-eye" 
                    class="p-button-rounded p-button-info" 
                    pTooltip="Voir les détails"
                    tooltipPosition="top"
                    (click)="viewSerieDetails(serie)"></button>
            <button pButton icon="pi pi-play" 
                    class="p-button-rounded p-button-success" 
                    pTooltip="Démarrer la série"
                    tooltipPosition="top"
                    (click)="startSerie(serie)"></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4" class="text-center p-4">
          <div class="flex flex-column align-items-center">
            <i class="pi pi-inbox text-4xl text-500 mb-3"></i>
            <span class="text-500">Aucune série trouvée pour ce patient</span>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
